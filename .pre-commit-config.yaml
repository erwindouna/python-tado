---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
        name: 🔠 Check for case conflicts
      - id: check-executables-have-shebangs
        name: 🧐 Check that executables have shebangs
        types: [text, executable]
        stages: [commit, push, manual]
      - id: check-json
        name: ｛ Check JSON files
        types: [json]
      - id: check-merge-conflict
        name: 💥 Check for merge conflicts
        types: [text]
      - id: check-symlinks
        name: 🔗 Check for broken symlinks
        types: [symlink]
      - id: check-toml
        name: ✅ Check TOML files
        types: [toml]
      - id: check-xml
        name: ✅ Check XML files
        types: [xml]
      - id: check-yaml
        name: ✅ Check YAML files
        types: [yaml]
      - id: detect-private-key
        name: 🕵️  Detect Private Keys
        types: [text]
      - id: end-of-file-fixer
        name: ⮐  Fix End of Files
        types: [text]
        stages: [commit, push, manual]
      - id: trailing-whitespace
        name: ✄ Trim Trailing Whitespace
        types: [text]
        stages: [commit, push, manual]
      - id: check-ast
        name: 🐍 Check Python AST
        types: [python]
      - id: check-docstring-first
        name: ℹ️  Check docstring is first
        types: [python]
      - id: no-commit-to-branch
        name: 🛑 Don't commit to main branch
        args: [--branch=main]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        name: 🐶 Ruff Linter
        stages: [commit, push, manual]
        args: [--fix]
      - id: ruff-format
        name: 🐶 Ruff Formatter
        stages: [commit, push, manual]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        name: 🆎 Static type checking using mypy
        types: [python]
        additional_dependencies: []

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: 💄 Ensuring files are prettier
        types: [yaml, json, markdown]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        name: 🎗  Check YAML files with yamllint
        types: [yaml]

  - repo: local
    hooks:
      - id: uv
        name: 📜 Check pyproject with uv
        language: system
        entry: uv lock --check
        pass_filenames: false
        always_run: true
      - id: pylint
        name: 🌟 Starring code with pylint
        language: system
        types: [python]
        entry: uv run pylint
      - id: pytest
        name: 🧪 Running tests and test coverage with pytest
        language: system
        types: [python]
        entry: uv run pytest --cov=tadoasync --cov-report=term-missing --cov-report=xml --cov-fail-under=95
        pass_filenames: false
